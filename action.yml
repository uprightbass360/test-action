name: 'Test Action'
description: 'A simple composite action for testing fork-sync'
inputs:
  greeting:
    description: 'Greeting to display'
    required: true
    default: 'Hello from test-action!'
  verbose:
    description: 'Enable verbose output'
    required: false
    default: 'false'
  format:
    description: 'Output format: text or json'
    required: false
    default: 'text'
runs:
  using: 'composite'
  steps:
    - name: Run greeting
      shell: bash
      env:
        VERBOSE: ${{ inputs.verbose }}
        FORMAT: ${{ inputs.format }}
      run: |
        if [ "$FORMAT" = "json" ]; then
          echo "{\"greeting\": \"${{ inputs.greeting }}\", \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
        elif [ "$VERBOSE" = "true" ]; then
          echo "[$(date -u)] ${{ inputs.greeting }}"
        else
          echo "${{ inputs.greeting }}"
        fi
    - name: Validate inputs
      shell: bash
      run: |
        echo "Action completed successfully"

