name: 'Test Action'
description: 'A simple composite action for testing fork-sync'
inputs:
  greeting:
    description: 'Greeting to display'
    required: true
    default: 'Hello from test-action!'
  verbose:
    description: 'Enable verbose output'
    required: false
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Run greeting
      shell: bash
      env:
        VERBOSE: ${{ inputs.verbose }}
      run: |
        if [ "$VERBOSE" = "true" ]; then
          echo "[$(date -u)] ${{ inputs.greeting }}"
        else
          echo "${{ inputs.greeting }}"
        fi
